<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-82KH0GR5ZS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-82KH0GR5ZS');
  </script>
  <title>Fumigaciones y Desinfecciones Especializadas | Control de Plagas</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              red: '#E53935',
              darkRed: '#B71C1C',
              green: '#E53935', 
              darkGreen: '#B71C1C',
              yellow: '#FBC02D',
              dark: '#1A1A1A',
              gray: '#F3F4F6',
              white: '#FFFFFF',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 20px 40px -15px rgba(45, 140, 60, 0.15)',
            'glow': '0 0 20px rgba(251, 192, 45, 0.5)',
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for a premium feel */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #E53935;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #B71C1C;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    /* Infinite Scroll Animation */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll {
      animation: scroll 80s linear infinite;
    }

    .animate-scroll:hover {
      animation-play-state: paused;
    }
  </style>

</head>

<body class="bg-brand-gray text-brand-dark antialiased selection:bg-brand-red selection:text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
